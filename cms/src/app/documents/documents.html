<div class="row">
    <div class="col-md-5">
        <cms-document-list (selectedDocumentEvent)="selectedDocument = $event"></cms-document-list>
    </div>

    <div class="col-md-4">
        <cms-document-detail 
        *ngIf="selectedDocument !== null && selectedDocument !== undefined"
        [document]="selectedDocument"></cms-document-detail>
    </div>
</div>
