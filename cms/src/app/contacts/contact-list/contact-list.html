<div class="panel panel-default">
    <div class="panel-heading">
        <div class="row">
            <div class="col-xs-9">
                <h2>Contacts</h2>
            </div>
            <div class="col-xs-3">
                <button class="btn btn-success">New Contact</button>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <cms-contact-item *ngFor="let contact of contacts"
        [contact] = "contact"
        (click) = "onSelected(contact)"></cms-contact-item>
    </div>
</div>
